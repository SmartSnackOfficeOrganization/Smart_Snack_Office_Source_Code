name: CI — SmartSnack Backend

# Se dispara en push y PRs hacia develop y main
on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  test:
    name: Tests y Linter (Django)
    runs-on: ubuntu-latest

    # PostgreSQL temporal solo para los tests del CI
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependencias
        working-directory: ./Backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verificar formato (Black)
        working-directory: ./Backend
        run: black --check .

      - name: Verificar orden de imports (isort)
        working-directory: ./Backend
        run: isort --check-only .

      - name: Correr migraciones
        working-directory: ./Backend
        env:
          DB_NAME: test_db
          DB_USER: test_user
          DB_PASSWORD: test_password
          DB_HOST: localhost
          DB_PORT: 5432
          SECRET_KEY: clave-de-prueba-solo-para-ci
          DEBUG: "True"
          ALLOWED_HOSTS: localhost,127.0.0.1
        run: python manage.py migrate

      - name: Correr tests
        working-directory: ./Backend
        env:
          DB_NAME: test_db
          DB_USER: test_user
          DB_PASSWORD: test_password
          DB_HOST: localhost
          DB_PORT: 5432
          SECRET_KEY: clave-de-prueba-solo-para-ci
          DEBUG: "True"
          ALLOWED_HOSTS: localhost,127.0.0.1
        run: python manage.py test